<!DOCTYPE html>
<html><head><script>
var p=window.location.pathname.replace(/\/$/,'');
var routes={'/privacy':'/privacy.html','/terms':'/terms.html','/form':'/#form'};

if(dest){window.location.replace(dest);}
else{window.location.replace('/');}
</script></head><body></body></html>
